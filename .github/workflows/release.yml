name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual dispatch so we can smoke-test the pipeline (especially
  # validate-linux) on a feature branch before cutting a release tag.
  # The release job is guarded with a ref-is-tag check below; a manual
  # dispatch will never create a GitHub release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: npm test

  build-linux:
    needs: [validate]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ pkg-config \
            libmpv-dev patchelf libjack-jackd2-0 \
            libgl1-mesa-dev libxkbcommon-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxcb-randr0 libxcb-render-util0 \
            libxcb-image0 libxcb-xfixes0 libxcb-sync1 libxcb-glx0 \
            libwayland-cursor0 libwayland-egl1 libegl1 \
            libfuse2

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: linux
          target: desktop
          modules: qtwebengine qtwebchannel qtpositioning qtserialport

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build AppImage
        run: bash install/build-appimage.sh --clean

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Rattin-x86_64.AppImage
          path: Rattin-x86_64.AppImage

  validate-linux:
    needs: [build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-22.04
            image: ubuntu:22.04
          - distro: ubuntu-24.04
            image: ubuntu:24.04
          - distro: fedora-40
            image: fedora:40
          - distro: archlinux
            image: archlinux:latest
    container:
      image: ${{ matrix.image }}
      options: --shm-size=2g

    steps:
      # Each distro image is minimal; install only what's needed to run
      # actions/checkout, setup-node, Playwright's Chromium, and xvfb.
      # Deliberately do NOT install libjack-jackd2-0, qt6-*, libmpv — the
      # whole point is to assert the AppImage ships those on its own.
      - name: Install runtime dependencies
        shell: bash
        run: |
          set -euxo pipefail
          if command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              git curl ca-certificates tar gzip xz-utils \
              xvfb libfuse2 \
              libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
              libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
              libxdamage1 libxfixes3 libxrandr2 libgbm1
            # libasound2 was renamed to libasound2t64 on 24.04 — try both,
            # fail only if neither resolves.
            apt-get install -y --no-install-recommends libasound2 \
              || apt-get install -y --no-install-recommends libasound2t64
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y --setopt=install_weak_deps=False \
              git curl ca-certificates tar gzip xz \
              xorg-x11-server-Xvfb fuse-libs \
              nss nspr atk at-spi2-atk \
              cups-libs libdrm libxkbcommon libXcomposite \
              libXdamage libXfixes libXrandr mesa-libgbm alsa-lib
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Sy --noconfirm --needed \
              git curl ca-certificates tar gzip xz \
              xorg-server-xvfb fuse2 \
              nss nspr atk at-spi2-atk \
              cups libdrm libxkbcommon libxcomposite \
              libxdamage libxfixes libxrandr mesa alsa-lib
          else
            echo "unknown distro — no package manager found" >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # With `name:` specified and no `path:`, download-artifact@v4 extracts
      # the artifact's contents directly into $GITHUB_WORKSPACE — so the
      # AppImage lands at $GITHUB_WORKSPACE/Rattin-x86_64.AppImage (the file).
      # The release job below downloads *all* artifacts (no `name:`), which
      # instead creates a subdir per artifact — hence the existing
      # "Rattin-x86_64.AppImage/Rattin-x86_64.AppImage" path there.
      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: Rattin-x86_64.AppImage

      - name: Install validator dependencies
        working-directory: test/appimage
        run: |
          npm ci
          # NOTE: appimage.spec.ts uses chromium.connectOverCDP() against Qt's
          # already-running WebEngine, so Playwright's bundled Chromium binary
          # is never actually launched. We still run `playwright install` as a
          # safety belt — some Playwright internals touch the browsers path on
          # startup and failures there surface as unhelpful errors. Cheap
          # enough to keep; revisit if CI time becomes a pressure point.
          # `--with-deps` is apt-only and we need this to work on fedora/arch
          # too, so we install deps manually in the step above.
          npx playwright install chromium

      # Outer safety: stage-1 gate ≤60s + Playwright worst case (retry × 60s
      # per-test timeout = 120s) + xvfb spawn + FUSE/extract-and-run cold
      # start = ~240s worst case. Matches jobs.timeout-minutes budget.
      - name: Run validator
        run: timeout 240 bash test/appimage/validator.sh "$GITHUB_WORKSPACE/Rattin-x86_64.AppImage"

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validator-${{ matrix.distro }}
          path: |
            /tmp/rattin-validator/
            test/appimage/playwright-report/
            test/appimage/test-results/
          if-no-files-found: ignore

  build-windows:
    needs: [validate]
    # Skip on manual dispatch — we run those to validate the Linux matrix,
    # burning Windows CI minutes on every dispatch is wasteful.
    if: github.event_name != 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract version from package.json
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          # NSIS VIProductVersion requires numeric X.X.X format — strip pre-release suffix
          $numericVersion = ($version -replace '-.*$', '')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "NUMERIC_VERSION=$numericVersion" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version (numeric: $numericVersion)"

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtwebengine qtwebchannel qtpositioning

      - name: Download libmpv
        shell: pwsh
        run: |
          # Get latest mpv-dev x86_64 from shinchiro's GitHub releases
          $release = gh api repos/shinchiro/mpv-winbuild-cmake/releases/latest --jq '.assets[] | select(.name | test("mpv-dev-x86_64-[0-9]")) | .browser_download_url' | Select-Object -First 1
          Write-Host "Downloading: $release"
          Invoke-WebRequest -Uri $release -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-dev -y
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Node.js binary
        shell: pwsh
        run: |
          $nodeVer = "20.18.1"
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v$nodeVer/node-v$nodeVer-win-x64.zip" -OutFile node.zip
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v$nodeVer/SHASUMS256.txt" -OutFile node-shasums.txt
          $expected = (Get-Content node-shasums.txt | Select-String "node-v$nodeVer-win-x64.zip").ToString().Split(" ")[0]
          $actual = (Get-FileHash node.zip -Algorithm SHA256).Hash.ToLower()
          if ($expected -ne $actual) {
              throw "Node.js checksum mismatch! Expected: $expected Got: $actual"
          }
          Write-Host "Node.js checksum verified: $actual"
          Expand-Archive node.zip -DestinationPath node-build -Force

      - name: Build frontend
        run: npm ci && npm run build

      - name: Build Qt shell
        shell: pwsh
        run: |
          $mpvDir = "$env:GITHUB_WORKSPACE/mpv-dev"
          cd shell
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DMPV_PREFIX="$mpvDir" `
            ..
          cmake --build . --config Release

      - name: Assemble distribution
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "Rattin"
          $app  = "$dist/app"
          New-Item -ItemType Directory -Force -Path $app | Out-Null

          # Qt shell + icon
          Copy-Item shell/build/Release/rattin-shell.exe $dist/
          Copy-Item packaging/windows/rattin.ico $dist/

          # windeployqt — try windeployqt6 first, fall back to windeployqt
          $wdq = Get-Command windeployqt6 -ErrorAction SilentlyContinue
          if (-not $wdq) { $wdq = Get-Command windeployqt -ErrorAction SilentlyContinue }
          if ($wdq) {
              & $wdq.Source "$dist/rattin-shell.exe" --qmldir shell --release --no-translations
          } else {
              Write-Error "windeployqt not found in PATH"
              exit 1
          }

          # Node.js — copy and rename (no resource patching to avoid AV false positives)
          $nodeDir = Get-ChildItem node-build -Directory | Select-Object -First 1
          Copy-Item "$($nodeDir.FullName)/node.exe" "$dist/rattin-runtime.exe"

          # libmpv
          Copy-Item mpv-dev/libmpv-2.dll $dist/

          # VC++ runtime DLLs (so users don't need to install the redist)
          $vcCrt = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\*\VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($vcCrt) {
              foreach ($dll in @("vcruntime140.dll","vcruntime140_1.dll","msvcp140.dll")) {
                  $src = Join-Path $vcCrt.FullName $dll
                  if (Test-Path $src) { Copy-Item $src "$dist/" }
              }
              Write-Host "Bundled VC++ runtime from $($vcCrt.FullName)"
          } else {
              Write-Error "VC++ redist not found — cannot bundle runtime DLLs"
              exit 1
          }

          # Bundle server into single JS file with esbuild
          npx esbuild server.ts --bundle --platform=node --format=esm `
            --outfile=compiled/server.js `
            --external:utp-native --external:node-datachannel `
            --external:bufferutil --external:utf-8-validate `
            --target=node20 `
            "--banner:js=import{createRequire}from'module';const require=createRequire(import.meta.url);"

          # App code — single bundled file + static assets
          foreach ($item in @("package.json","package-lock.json")) {
              if (Test-Path $item) { Copy-Item $item "$app/" }
          }
          Copy-Item compiled/server.js "$app/"
          Copy-Item public (Join-Path $app "public") -Recurse

          # Production dependencies
          Push-Location $app
          & "$env:GITHUB_WORKSPACE/$dist/rattin-runtime.exe" "$($nodeDir.FullName)/node_modules/npm/bin/npm-cli.js" ci --omit=dev
          Pop-Location

      - name: Verify distribution
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "Rattin"
          $app  = "$dist/app"
          $errors = 0

          # Core binaries
          foreach ($bin in @("rattin-shell.exe", "rattin-runtime.exe", "libmpv-2.dll")) {
              if (-not (Test-Path "$dist/$bin")) {
                  Write-Error "Missing binary: $bin"
                  $errors++
              }
          }

          # VC++ runtime
          foreach ($dll in @("vcruntime140.dll", "msvcp140.dll")) {
              if (-not (Test-Path "$dist/$dll")) {
                  Write-Error "Missing VC++ runtime: $dll"
                  $errors++
              }
          }

          # Qt DLLs
          foreach ($qt in @("Qt6Core.dll", "Qt6Gui.dll", "Qt6Quick.dll",
                            "Qt6WebEngineCore.dll", "Qt6Network.dll", "Qt6WebChannel.dll")) {
              if (-not (Test-Path "$dist/$qt")) {
                  Write-Error "Missing Qt DLL: $qt"
                  $errors++
              }
          }

          # QtWebEngineProcess
          if (-not (Test-Path "$dist/QtWebEngineProcess.exe")) {
              Write-Error "Missing QtWebEngineProcess.exe"
              $errors++
          }

          # Server bundle
          $serverJs = "$app/server.js"
          if (-not (Test-Path $serverJs)) {
              Write-Error "Missing server.js bundle"
              $errors++
          } else {
              $size = (Get-Item $serverJs).Length
              if ($size -lt 10000) {
                  Write-Error "server.js suspiciously small ($size bytes)"
                  $errors++
              }
              & "$dist/rattin-runtime.exe" --check $serverJs
              if ($LASTEXITCODE -ne 0) {
                  Write-Error "server.js has syntax errors"
                  $errors++
              }
          }

          # Frontend assets
          if (-not (Test-Path "$app/public/index.html")) {
              Write-Error "Missing frontend: public/index.html"
              $errors++
          }
          if (-not (Get-ChildItem "$app/public/assets" -Filter "*.js" -ErrorAction SilentlyContinue)) {
              Write-Error "Missing frontend JS assets"
              $errors++
          }
          if (-not (Get-ChildItem "$app/public/assets" -Filter "*.css" -ErrorAction SilentlyContinue)) {
              Write-Error "Missing frontend CSS assets"
              $errors++
          }

          # node_modules
          if (-not (Test-Path "$app/node_modules")) {
              Write-Error "Missing node_modules"
              $errors++
          }

          if ($errors -gt 0) {
              throw "Distribution verification failed with $errors error(s)"
          }
          Write-Host "Distribution verification passed" -ForegroundColor Green

      - name: Create portable ZIP
        shell: pwsh
        run: Compress-Archive -Path Rattin -DestinationPath Rattin-x64-Portable.zip

      - name: Install NSIS
        shell: pwsh
        run: |
          for ($i = 1; $i -le 3; $i++) {
              choco install nsis -y 2>&1
              if (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe") { break }
              Write-Host "NSIS not found after attempt $i, retrying in 15s..."
              Start-Sleep -Seconds 15
          }
          if (-not (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe")) {
              throw "Failed to install NSIS after 3 attempts"
          }

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $distDir = "$env:GITHUB_WORKSPACE/Rattin"
          $output  = "$env:GITHUB_WORKSPACE/Rattin-x64-Setup.exe"
          $pluginDir = "$env:GITHUB_WORKSPACE/packaging/windows/Plugins"
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            /DVERSION="${{ steps.version.outputs.NUMERIC_VERSION }}" `
            /DDIST_DIR="$distDir" `
            /DOUTPUT="$output" `
            /X"!addplugindir /x86-unicode $pluginDir\x86-unicode" `
            packaging/windows/rattin.nsi

      - name: Smoke test distribution
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "$env:GITHUB_WORKSPACE/Rattin"
          $logFile = "$env:TEMP/smoke.log"

          # Start the app and capture output
          $proc = Start-Process -FilePath "$dist/rattin-shell.exe" `
            -RedirectStandardOutput $logFile `
            -RedirectStandardError "$env:TEMP/smoke-err.log" `
            -PassThru

          # Wait up to 30s for server to start
          $started = $false
          for ($i = 1; $i -le 30; $i++) {
              Start-Sleep -Seconds 1
              if ($proc.HasExited) {
                  Write-Error "App crashed during startup (exit code: $($proc.ExitCode))"
                  Get-Content $logFile -ErrorAction SilentlyContinue
                  Get-Content "$env:TEMP/smoke-err.log" -ErrorAction SilentlyContinue
                  exit 1
              }
              $logs = ""
              if (Test-Path $logFile) { $logs += Get-Content $logFile -Raw -ErrorAction SilentlyContinue }
              if (Test-Path "$env:TEMP/smoke-err.log") { $logs += Get-Content "$env:TEMP/smoke-err.log" -Raw -ErrorAction SilentlyContinue }
              if ($logs -match "Rattin running at") {
                  $started = $true
                  break
              }
          }

          if (-not $started) {
              Write-Error "Server did not start within 30s"
              Get-Content $logFile -ErrorAction SilentlyContinue
              Get-Content "$env:TEMP/smoke-err.log" -ErrorAction SilentlyContinue
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              exit 1
          }
          Write-Host "Server started"

          # Verify HTTP response
          try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:9630" -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -ne 200) {
                  Write-Error "Server responded with HTTP $($response.StatusCode)"
                  Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
                  exit 1
              }
              Write-Host "HTTP 200 OK"
          } catch {
              Write-Error "HTTP request failed: $_"
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              exit 1
          }

          # Check for error patterns
          $allLogs = ""
          if (Test-Path $logFile) { $allLogs += Get-Content $logFile -Raw -ErrorAction SilentlyContinue }
          if (Test-Path "$env:TEMP/smoke-err.log") { $allLogs += Get-Content "$env:TEMP/smoke-err.log" -Raw -ErrorAction SilentlyContinue }
          $errorPatterns = "Cannot load library|module not found|FATAL|SIGABRT"
          if ($allLogs -match $errorPatterns) {
              Write-Error "Found error patterns in startup logs"
              Write-Host $allLogs
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              exit 1
          }

          Write-Host "Smoke test passed"
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Rattin-x64-Portable.zip
          path: Rattin-x64-Portable.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Rattin-x64-Setup.exe
          path: Rattin-x64-Setup.exe

  release:
    needs: [validate-linux, build-windows]
    # Only cut a GitHub release on actual tag pushes — never on manual
    # dispatches against a branch (used for validating the pipeline).
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Verify artifact sizes
        run: |
          set -euo pipefail
          errors=0

          check_size() {
            local file="$1" min_mb="$2" label="$3"
            if [ ! -f "$file" ]; then
              echo "::error::Missing artifact: $label ($file)"
              errors=$((errors + 1))
              return
            fi
            local size_bytes
            size_bytes=$(stat -c%s "$file")
            local size_mb=$((size_bytes / 1048576))
            if [ "$size_bytes" -lt $((min_mb * 1048576)) ]; then
              echo "::error::$label is only ${size_mb}MB (minimum: ${min_mb}MB) — likely corrupt or incomplete"
              errors=$((errors + 1))
            else
              echo "$label: ${size_mb}MB ✓"
            fi
          }

          check_size "Rattin-x86_64.AppImage/Rattin-x86_64.AppImage" 100 "Linux AppImage"
          check_size "Rattin-x64-Portable.zip/Rattin-x64-Portable.zip" 100 "Windows Portable ZIP"
          check_size "Rattin-x64-Setup.exe/Rattin-x64-Setup.exe" 50 "Windows Installer"

          if [ "$errors" -gt 0 ]; then
            echo "::error::Artifact size verification failed with $errors error(s)"
            exit 1
          fi

      - name: Generate checksums
        run: |
          sha256sum \
            Rattin-x86_64.AppImage/Rattin-x86_64.AppImage \
            Rattin-x64-Portable.zip/Rattin-x64-Portable.zip \
            Rattin-x64-Setup.exe/Rattin-x64-Setup.exe \
            | sed 's|[^ ]*/||' > SHA256SUMS.txt
          echo "Checksums:"
          cat SHA256SUMS.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE=""
          if [[ "${{ github.ref_name }}" == *"-rc"* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            $PRERELEASE \
            Rattin-x86_64.AppImage/Rattin-x86_64.AppImage \
            Rattin-x64-Portable.zip/Rattin-x64-Portable.zip \
            Rattin-x64-Setup.exe/Rattin-x64-Setup.exe \
            SHA256SUMS.txt
