name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ \
            qt6-base-dev qt6-webengine-dev qt6-declarative-dev qt6-webchannel-dev \
            libmpv-dev \
            qml6-module-qtwebengine qml6-module-qtwebengine-controlsdelegates \
            qml6-module-qtquick qml6-module-qtquick-window qml6-module-qtquick-layouts \
            qml6-module-qtquick-controls qml6-module-qtquick-templates qml6-module-qtwebchannel \
            qml6-module-qtqml qml6-module-qtqml-models qml6-module-qtqml-workerscript \
            qml6-module-qtcore \
            libfuse2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build AppImage
        run: bash install/build-appimage.sh --clean

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Rattin-x86_64.AppImage
          path: Rattin-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract version from package.json
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          # NSIS VIProductVersion requires numeric X.X.X format — strip pre-release suffix
          $numericVersion = ($version -replace '-.*$', '')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "NUMERIC_VERSION=$numericVersion" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version (numeric: $numericVersion)"

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtwebengine qtwebchannel qtpositioning

      - name: Download libmpv
        shell: pwsh
        run: |
          # Get latest mpv-dev x86_64 from shinchiro's GitHub releases
          $release = gh api repos/shinchiro/mpv-winbuild-cmake/releases/latest --jq '.assets[] | select(.name | test("mpv-dev-x86_64-[0-9]")) | .browser_download_url' | Select-Object -First 1
          Write-Host "Downloading: $release"
          Invoke-WebRequest -Uri $release -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-dev -y
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Node.js binary
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v20.18.1/node-v20.18.1-win-x64.zip" -OutFile node.zip
          Expand-Archive node.zip -DestinationPath node-build -Force

      - name: Download rcedit
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile rcedit.exe

      - name: Build frontend
        run: npm ci && npm run build

      - name: Build Qt shell
        shell: pwsh
        run: |
          $mpvDir = "$env:GITHUB_WORKSPACE/mpv-dev"
          cd shell
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DMPV_PREFIX="$mpvDir" `
            ..
          cmake --build . --config Release

      - name: Assemble distribution
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "Rattin"
          $app  = "$dist/app"
          New-Item -ItemType Directory -Force -Path $app | Out-Null

          # Qt shell + icon
          Copy-Item shell/build/Release/rattin-shell.exe $dist/
          Copy-Item packaging/windows/rattin.ico $dist/

          # windeployqt — try windeployqt6 first, fall back to windeployqt
          $wdq = Get-Command windeployqt6 -ErrorAction SilentlyContinue
          if (-not $wdq) { $wdq = Get-Command windeployqt -ErrorAction SilentlyContinue }
          if ($wdq) {
              & $wdq.Source "$dist/rattin-shell.exe" --qmldir shell --release --no-translations
          } else {
              Write-Error "windeployqt not found in PATH"
              exit 1
          }

          # Node.js — copy, rename, and brand before npm ci uses it
          $nodeDir = Get-ChildItem node-build -Directory | Select-Object -First 1
          Copy-Item "$($nodeDir.FullName)/node.exe" "$dist/rattin-runtime.exe"
          $numVer = "${{ steps.version.outputs.NUMERIC_VERSION }}"
          & .\rcedit.exe "$dist\rattin-runtime.exe" `
            --set-icon "$dist\rattin.ico" `
            --set-version-string "ProductName" "RattinRuntime" `
            --set-version-string "FileDescription" "Rattin Server Runtime" `
            --set-version-string "OriginalFilename" "rattin-runtime.exe" `
            --set-version-string "InternalName" "rattin-runtime" `
            --set-version-string "FileVersion" "$numVer" `
            --set-version-string "ProductVersion" "$numVer"

          # libmpv
          Copy-Item mpv-dev/libmpv-2.dll $dist/

          # VC++ runtime DLLs (so users don't need to install the redist)
          $vcCrt = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\*\VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($vcCrt) {
              foreach ($dll in @("vcruntime140.dll","vcruntime140_1.dll","msvcp140.dll")) {
                  $src = Join-Path $vcCrt.FullName $dll
                  if (Test-Path $src) { Copy-Item $src "$dist/" }
              }
              Write-Host "Bundled VC++ runtime from $($vcCrt.FullName)"
          } else {
              Write-Error "VC++ redist not found — cannot bundle runtime DLLs"
              exit 1
          }

          # Bundle server into single JS file with esbuild
          npx esbuild server.ts --bundle --platform=node --format=esm `
            --outfile=compiled/server.js `
            --external:utp-native --external:node-datachannel `
            --external:bufferutil --external:utf-8-validate `
            --target=node20 `
            "--banner:js=import{createRequire}from'module';const require=createRequire(import.meta.url);"

          # App code — single bundled file + static assets
          foreach ($item in @("package.json","package-lock.json")) {
              if (Test-Path $item) { Copy-Item $item "$app/" }
          }
          Copy-Item compiled/server.js "$app/"
          Copy-Item public (Join-Path $app "public") -Recurse

          # Production dependencies
          Push-Location $app
          & "$env:GITHUB_WORKSPACE/$dist/rattin-runtime.exe" "$($nodeDir.FullName)/node_modules/npm/bin/npm-cli.js" ci --omit=dev
          Pop-Location

      - name: Create portable ZIP
        shell: pwsh
        run: Compress-Archive -Path Rattin -DestinationPath Rattin-x64-Portable.zip

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $distDir = "$env:GITHUB_WORKSPACE/Rattin"
          $output  = "$env:GITHUB_WORKSPACE/Rattin-x64-Setup.exe"
          $pluginDir = "$env:GITHUB_WORKSPACE/packaging/windows/Plugins"
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            /DVERSION="${{ steps.version.outputs.NUMERIC_VERSION }}" `
            /DDIST_DIR="$distDir" `
            /DOUTPUT="$output" `
            /X"!addplugindir /x86-unicode $pluginDir\x86-unicode" `
            packaging/windows/rattin.nsi

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Rattin-x64-Portable.zip
          path: Rattin-x64-Portable.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Rattin-x64-Setup.exe
          path: Rattin-x64-Setup.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            Rattin-x86_64.AppImage/Rattin-x86_64.AppImage \
            Rattin-x64-Portable.zip/Rattin-x64-Portable.zip \
            Rattin-x64-Setup.exe/Rattin-x64-Setup.exe
